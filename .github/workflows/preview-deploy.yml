name: Preview Deploy

on:
  push:
    branches: [feat/*, fix/*]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-preview
          path: coverage/

  deploy-preview:
    name: Deploy preview
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  health-check:
    name: Preview health check
    needs: deploy-preview
    runs-on: ubuntu-latest
    steps:
      - name: Wait for preview to be ready
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' https://pre.ai-grija.ro/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then echo "Preview healthy"; exit 0; fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "ERROR: Preview not healthy after 150s"
          exit 1

  bowser-test:
    name: E2E Bowser stories
    needs: health-check
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.50.0-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run Bowser stories
        env:
          BASE_URL: https://pre.ai-grija.ro
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CI: 'true'
        run: npx tsx e2e/bowser-dispatch.ts --base-url $BASE_URL
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bowser-report
          path: |
            playwright-report/
            allure-results/

  allure-report:
    name: Publish Allure Report
    needs: bowser-test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: bowser-report
          path: .
        continue-on-error: true

      - name: Load previous Allure history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Copy history
        run: |
          mkdir -p allure-results/history
          cp -r gh-pages/reports/allure/history/* allure-results/history/ 2>/dev/null || true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.9
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          destination_dir: reports/allure
