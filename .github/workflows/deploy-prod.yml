name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_tests:
        description: 'Skip test gates (emergency only)'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Unit tests with coverage
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests with coverage
        run: npx vitest run --coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-prod
          path: coverage/

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high

  infra-validate:
    name: Infrastructure validation
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate infra config
        run: bash scripts/validate-infra.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: cd infra && npm ci
      - name: Install policy pack
        run: cd infra/policy && npm install
      - name: Pulumi preview with CrossGuard
        uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: production
          work-dir: infra
          policyPacks: infra/policy
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  deploy:
    name: Deploy to Cloudflare Workers
    needs: [typecheck, test, secret-scan, dependency-audit, infra-validate]
    if: ${{ always() && (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') && (needs.test.result == 'success' || needs.test.result == 'skipped') && (needs.secret-scan.result == 'success' || needs.secret-scan.result == 'skipped') && (needs.dependency-audit.result == 'success' || needs.dependency-audit.result == 'skipped') && (needs.infra-validate.result == 'success' || needs.infra-validate.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment || 'production' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://ai-grija.ro |" >> $GITHUB_STEP_SUMMARY

  health-check:
    name: Production health check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for production to be ready
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' https://ai-grija.ro/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then echo "Production healthy"; exit 0; fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "ERROR: Production not healthy after 150s"
          exit 1

  post-deploy-bdd:
    name: Post-deploy BDD verification
    needs: health-check
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.50.0-noble
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run BDD stories against production
        id: bdd
        continue-on-error: true
        env:
          BASE_URL: https://ai-grija.ro
          CI: 'true'
        run: npx tsx e2e/bowser-dispatch.ts --base-url $BASE_URL 2>&1 | tee bdd-output.txt
      - name: Create GitHub issues for failures
        if: steps.bdd.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          for result_file in e2e/results/*.json; do
            [ -f "$result_file" ] || continue
            story_name=$(jq -r '.story // empty' "$result_file" 2>/dev/null) || continue
            [ -z "$story_name" ] && continue
            verdict=$(jq -r '[.passes | to_entries[] | select(.value == "fail")] | length' "$result_file" 2>/dev/null) || continue
            if [ "$verdict" -gt "0" ]; then
              failed_passes=$(jq -r '[.passes | to_entries[] | select(.value == "fail") | .key] | join(", ")' "$result_file")
              existing=$(gh issue list --search "QA: $story_name" --label "qa:story" --json number --jq '.[0].number' 2>/dev/null || echo "")
              if [ -z "$existing" ]; then
                gh issue create \
                  --title "QA: $story_name - $failed_passes failed" \
                  --label "qa:fail,qa:story,auto-detected" \
                  --body "## Post-Deploy BDD Failure

Story: $story_name
URL: https://ai-grija.ro
Failed passes: $failed_passes
Commit: $COMMIT_SHA

Auto-created by post-deploy BDD verification."
              fi
            fi
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-report
          path: playwright-report/
