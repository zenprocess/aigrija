name: "Verificare SMS suspect"
description: "Utilizatorul primeste un SMS suspect de la banca si il verifica pe ai-grija.ro"
steps:
  - action: navigate
    url: /
  - action: screenshot
    name: homepage
  - action: fill
    selector: "textarea[data-testid='checker-textarea']"
    value: "Contul dvs ING a fost blocat. Accesati urgent: http://ing-verify.com/deblocare"
  - action: click
    selector: "button[data-testid='checker-submit-btn']"
  - action: wait
    selector: "button[data-testid='checker-action-share']"
    timeout: 15000
  - action: screenshot
    name: verdict-phishing
  - action: assert
    selector: body
    contains: "PHISHING"
  - action: click
    selector: "button[data-testid='checker-action-share']"
  - action: screenshot
    name: share-modal
