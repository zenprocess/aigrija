name = "ai-grija-ro"
main = "src/worker/index.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "CACHE"
id = "TBD"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "ai-grija-share-cards"
# R2 lifecycle: configure via dashboard — delete objects older than 30 days

[[d1_databases]]
binding = "DB"
database_name = "ai-grija-admin"
# After pulumi up, run: pulumi stack output d1DatabaseId
# Then replace the placeholder below with the actual ID
database_id = "TBD"

[[queues.producers]]
queue = "draft-generation"
binding = "DRAFT_QUEUE"

[[queues.consumers]]
queue = "draft-generation"
max_batch_size = 5

# [[queues.producers]]
# queue = "report-signals"
# binding = "REPORT_QUEUE"

[vars]
BASE_URL = "https://ai-grija.ro"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "ai_grija"
