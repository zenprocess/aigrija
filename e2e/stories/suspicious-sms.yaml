name: "Verificare SMS suspect"
description: "Utilizatorul primeste un SMS suspect de la banca si il verifica pe ai-grija.ro"
steps:
  - action: navigate
    url: "/"
  - action: wait
    selector: "[data-testid='checker-textarea'], [data-testid='check-input'], textarea"
    timeout: 15000
  - action: screenshot
    name: homepage-loaded
  - action: fill
    selector: "[data-testid='checker-textarea'], [data-testid='check-input'], textarea"
    value: "Contul dvs ING a fost blocat. Accesati urgent: http://ing-verify.com/deblocare pentru a evita blocarea permanenta."
  - action: screenshot
    name: text-filled
  - action: click
    selector: "[data-testid='checker-submit-btn'], [data-testid='check-submit'], button[type='submit']"
  - action: wait
    selector: "[data-testid='checker-action-share'], [data-testid='verdict-card'], [data-testid='check-result'], .verdict-card"
    timeout: 45000
  - action: screenshot
    name: verdict-phishing
  - action: assert
    selector: body
    contains: "PHISHING"
  - action: assert
    selector: body
    contains: "phishing"
  - action: click
    selector: "[data-testid='checker-action-share']"
  - action: screenshot
    name: share-modal-opened
