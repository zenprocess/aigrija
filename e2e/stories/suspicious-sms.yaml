name: "Verificare SMS suspect"
tags: [regression, api]
description: "Testeaza pagina de raportare si alertele SSR — verificarea mesajelor via API necesita POST si nu poate fi efectuata cu navigate"
steps:
  - action: navigate
    url: "/alerte"
  - action: wait
    selector: "body"
    timeout: 15000
  - action: screenshot
    name: alerte-page-loaded
  - action: assert
    selector: "body"
    contains: "ai-grija.ro"
  - action: navigate
    url: "/raport"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: raport-page
  - action: assert
    selector: "body"
    contains: "Generator Raport Incident"
  - action: assert
    selector: "body"
    contains: "DNSC"
  - action: navigate
    url: "/alerte"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: alerte-index
  - action: assert
    selector: "h1"
    contains: "Alerte phishing"
