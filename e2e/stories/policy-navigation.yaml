name: "Navigare politici legale"
description: "Utilizatorul verifica paginile legale in romana"
steps:
  - action: navigate
    url: "/#/confidentialitate"
  - action: screenshot
    name: privacy-ro
  - action: assert
    selector: body
    contains: "Confidentialitate"
  - action: assert
    selector: "button[data-testid='privacy-back-btn']"
    contains: "napoi"
  - action: navigate
    url: "/#/termeni"
  - action: screenshot
    name: termeni-ro
  - action: assert
    selector: body
    contains: "Termeni"
