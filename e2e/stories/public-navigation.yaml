name: "Public site navigation"
description: "Ca utilizator, verific ca paginile principale si navigarea functioneaza corect"
steps:
  - action: navigate
    url: "/"
  - action: wait
    selector: "body"
    timeout: 15000
  - action: screenshot
    name: homepage
  - action: assert
    selector: "body"
    contains: "ai-grija"
  - action: navigate
    url: "/alerte"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: alerte-page
  - action: assert
    selector: "h1, h2, body"
    contains: ""
  - action: navigate
    url: "/blog"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: blog-page
  - action: navigate
    url: "/raportare"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: raportare-page
  - action: assert
    selector: "body"
    contains: ""
  - action: navigate
    url: "/gdpr"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: gdpr-page
  - action: assert
    selector: "body"
    contains: "GDPR"
  - action: navigate
    url: "/"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: back-home
