name: "Navigare politici legale"
tags: [regression, a11y]
description: "Utilizatorul viziteaza toate paginile legale disponibile ca SSR: GDPR, politica de confidentialitate, termeni si conditii"
steps:
  - action: navigate
    url: "/gdpr"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: gdpr-page
  - action: assert
    selector: "h1, h2, body"
    matches: "GDPR"
  - action: navigate
    url: "/policies/privacy"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: privacy-page
  - action: assert
    selector: "h1, h2, body"
    matches: "Politica de"
  - action: navigate
    url: "/policies/general-terms"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: termeni-page
  - action: assert
    selector: "h1, h2, body"
    matches: "Termeni"
  - action: navigate
    url: "/"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: back-to-homepage
