name = "ai-grija-ro"
main = "src/worker/index.ts"
compatibility_date = "2026-03-01"

routes = [
  { pattern = "ai-grija.ro/*", zone_name = "ai-grija.ro" },
  { pattern = "admin.ai-grija.ro/*", zone_name = "ai-grija.ro" },
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "CACHE"
id = "fd0667f87eb44232badd391fc3c72bde"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "ai-grija-share-cards"
# R2 Lifecycle Policy — IMPORTANT:
# Cloudflare R2 does not support lifecycle rules in wrangler.toml.
# Configure via CF Dashboard: R2 → ai-grija-share-cards → Settings → Object lifecycle rules.
# Recommended rule: expire objects (share cards) after 30 days.
# Alternatively, the scheduled cron invokes src/worker/lib/r2-cleanup.ts::deleteOldShareCards()
# which programmatically deletes objects older than 30 days as a fallback.

[[d1_databases]]
binding = "DB"
database_name = "ai-grija-admin"
# After pulumi up, run: pulumi stack output d1DatabaseId
# Then replace the placeholder below with the actual ID
database_id = "9d15ccda-3648-4a93-8856-2ac5b5ffe199"

[[d1_databases]]
binding = "ADMIN_DB"
database_name = "ai-grija-admin"
database_id = "9d15ccda-3648-4a93-8856-2ac5b5ffe199"

[[queues.producers]]
queue = "draft-generation"
binding = "DRAFT_QUEUE"

# [[queues.consumers]]
# queue = "draft-generation"
# max_batch_size = 5

# [[queues.producers]]
# queue = "report-signals"
# binding = "REPORT_QUEUE"

[vars]
BASE_URL = "https://ai-grija.ro"


[triggers]
crons = ["0 0 * * *", "0 1 * * *", "0 6 * * 1"]
# 00:00 daily = campaign scraper
# 01:00 daily = R2 share card cleanup
# 06:00 Monday = weekly digest

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "ai_grija"

# ---------------------------------------------------------------------------
# Preview environment — pre.ai-grija.ro / pre-admin.ai-grija.ro
# Deploy with: npx wrangler deploy --env preview
# ---------------------------------------------------------------------------
[env.preview]
name = "ai-grija-ro-preview"
routes = [
  { pattern = "pre.ai-grija.ro/*", zone_name = "ai-grija.ro" },
  { pattern = "pre-admin.ai-grija.ro/*", zone_name = "ai-grija.ro" },
]
vars = { BASE_URL = "https://pre.ai-grija.ro" }

[[env.preview.kv_namespaces]]
binding = "CACHE"
id = "912ef2fa84a445f0bb916896881a9fac"

[[env.preview.r2_buckets]]
binding = "STORAGE"
bucket_name = "ai-grija-share-cards-preview"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "ai-grija-admin-preview"
database_id = "4d78649f-36ef-49bf-bcc1-672c61c5dd93"


[[env.preview.d1_databases]]
binding = "ADMIN_DB"
database_name = "ai-grija-admin-preview"
database_id = "4d78649f-36ef-49bf-bcc1-672c61c5dd93"

[env.preview.ai]
binding = "AI"

[[env.preview.queues.producers]]
queue = "draft-generation-preview"
binding = "DRAFT_QUEUE"

# [[env.preview.queues.consumers]]
# queue = "draft-generation-preview"
# max_batch_size = 5

[env.preview.triggers]
crons = ["0 0 * * *"]

[[env.preview.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "ai_grija_preview"
