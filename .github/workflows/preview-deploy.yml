name: Preview Deploy

on:
  push:
    branches: [feat/*, fix/*]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-preview
          path: coverage/

  deploy-preview:
    name: Deploy preview
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npx wrangler deploy --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  health-check:
    name: Preview health check
    needs: deploy-preview
    runs-on: ubuntu-latest
    steps:
      - name: Wait for preview to be ready
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' https://pre.ai-grija.ro/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then echo "Preview healthy"; exit 0; fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "ERROR: Preview not healthy after 150s"
          exit 1

  bowser-test:
    name: E2E Bowser stories
    needs: health-check
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.50.0-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run Bowser stories
        env:
          BASE_URL: https://pre.ai-grija.ro
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CI: 'true'
        run: npx tsx e2e/bowser-dispatch.ts --base-url $BASE_URL
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bowser-report
          path: playwright-report/
