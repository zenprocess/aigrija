name: cookie-consent
description: Verify cookie consent banner appears, can be accepted/rejected, persists in localStorage
base_path: /
viewport:
  width: 1440
  height: 900

steps:
  - action: navigate
    path: /
  - action: wait
    selector: "[data-testid='consent-banner']"
    timeout: 3000
  - action: click
    selector: "[data-testid='consent-settings-btn']"
  - action: wait
    selector: "[data-testid='consent-analytics-toggle']"
    timeout: 2000
  - action: click
    selector: "[data-testid='consent-accept-all']"

assertions:
  - type: visible
    selector: "[data-testid='consent-banner']"
  - type: not-visible-after-action
    selector: "[data-testid='consent-banner']"
    action: "click [data-testid='consent-accept-all']"
  - type: localStorage
    key: cookie_consent_given
    value: "true"
  - type: responsive
    breakpoints: [375, 768, 1440]
