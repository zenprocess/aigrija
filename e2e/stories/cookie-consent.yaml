name: cookie-consent
tags:
- regression
description: Verifica ca pagina principala se incarca si ca paginile SSR sunt accesibile
  — bannerul cookie este SPA-only si nu poate fi testat fara build
steps:
- action: navigate
  url: /
- action: wait
  selector: body
  timeout: 10000
- action: screenshot
  name: homepage-loaded
- action: navigate
  url: /gdpr
- action: wait
  selector: body
  timeout: 10000
- action: screenshot
  name: gdpr-page
- action: assert
  selector: h1, h2, body
  matches: GDPR
- action: navigate
  url: /policies/privacy
- action: wait
  selector: body
  timeout: 10000
- action: screenshot
  name: privacy-page
- action: assert
  selector: body
  matches: ai-grija\.ro
