name: cookie-consent
description: Verify cookie consent banner appears and can be accepted
steps:
  - action: navigate
    url: /#/
  - action: wait
    selector: "[data-testid='consent-banner']"
    timeout: 10000
  - action: screenshot
    name: consent-banner-visible
  - action: click
    selector: "[data-testid='consent-settings-btn']"
  - action: wait
    selector: "[data-testid='consent-analytics-toggle']"
    timeout: 5000
  - action: screenshot
    name: consent-settings-open
  - action: click
    selector: "[data-testid='consent-accept-all']"
  - action: screenshot
    name: consent-accepted
