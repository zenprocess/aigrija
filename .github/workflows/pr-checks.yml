name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  unit-tests:
    name: Unit tests with coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests with coverage
        run: npx vitest run --coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e-api:
    name: E2E API tests
    needs: [typecheck, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build SPA assets
        run: npm run build
      - name: Run API E2E tests
        run: npx playwright test e2e/api.spec.ts e2e/health.spec.ts e2e/telegram-webhook.spec.ts --project=chromium
        env:
          BASE_URL: http://localhost:8787

  e2e-browser:
    name: E2E browser tests
    needs: [typecheck, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build SPA assets
        run: npm run build
      - name: Run browser E2E tests
        run: npx playwright test --ignore-pattern='**/api.spec.ts' --ignore-pattern='**/health.spec.ts' --ignore-pattern='**/telegram-webhook.spec.ts'
        env:
          BASE_URL: http://localhost:8787
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high

  infra-validate:
    name: Infrastructure validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate infra config
        run: bash scripts/validate-infra.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: cd infra && npm ci
      - name: Install policy pack
        run: cd infra/policy && npm ci
      - name: Pulumi preview with CrossGuard
        uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: dev
          work-dir: infra
          policyPacks: infra/policy
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
