name: "Public pages rendering"
tags: [smoke, critical, regression]
description: "Verifica ca paginile publice principale se incarca corect si au continut valid"
steps:
  - action: navigate
    url: "/alerte"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: alerte-page
  - action: assert
    selector: "h1"
    matches: "Alerte"

  - action: navigate
    url: "/blog"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: blog-page
  - action: assert
    selector: "body"
    visible: true

  - action: navigate
    url: "/gdpr"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: gdpr-page
  - action: assert
    selector: "h1, h2, body"
    matches: "GDPR"

  - action: navigate
    url: "/policies/privacy"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: privacy-page
  - action: assert
    selector: "body"
    matches: "dataprotection\\.ro"

  - action: navigate
    url: "/"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: homepage-final
