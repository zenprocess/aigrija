name: "Navigare politici legale"
description: "Utilizatorul viziteaza toate paginile legale: GDPR, cookie-uri, termeni"
steps:
  - action: navigate
    url: "/gdpr"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: gdpr-page
  - action: assert
    selector: "body"
    contains: "GDPR"
  - action: navigate
    url: "/politica-cookies"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: politica-cookies-page
  - action: assert
    selector: "body"
    contains: "cookie"
  - action: navigate
    url: "/termeni"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: termeni-page
  - action: assert
    selector: "body"
    contains: "Termeni"
  - action: navigate
    url: "/"
  - action: wait
    selector: "body"
    timeout: 10000
  - action: screenshot
    name: back-to-homepage
