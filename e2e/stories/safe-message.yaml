name: "Verificare mesaj sigur"
description: "Mesaj legitim de la un prieten — trebuie sa primeasca verdictul SIGUR"
steps:
  - action: navigate
    url: "/"
  - action: wait
    selector: "[data-testid='checker-textarea'], [data-testid='check-input'], textarea"
    timeout: 15000
  - action: screenshot
    name: homepage-ready
  - action: fill
    selector: "[data-testid='checker-textarea'], [data-testid='check-input'], textarea"
    value: "Salut! Ne vedem maine la cafea? Am rezervat la Origo, ora 18:00."
  - action: click
    selector: "[data-testid='checker-submit-btn'], [data-testid='check-submit'], button[type='submit']"
  - action: wait
    selector: "[data-testid='checker-action-share'], [data-testid='verdict-card'], [data-testid='check-result'], .verdict-card"
    timeout: 45000
  - action: screenshot
    name: verdict-safe
  - action: assert
    selector: body
    contains: "SIGUR"
  - action: assert
    selector: "[data-testid='verdict-card'], [data-testid='check-result'], .verdict-card, body"
    contains: "sigur"
