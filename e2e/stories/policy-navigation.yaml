name: "Navigare politici legale"
description: "Utilizatorul verifica paginile legale in romana"
steps:
  - action: navigate
    url: "/#/confidentialitate"
  - action: wait
    selector: body
    timeout: 10000
  - action: wait
    selector: "[data-testid='privacy-back-btn']"
    timeout: 15000
  - action: screenshot
    name: privacy-ro
  - action: assert
    selector: body
    contains: "Confidențialitate"
  - action: assert
    selector: "[data-testid='privacy-back-btn']"
    contains: "napoi"
  - action: navigate
    url: "/#/termeni"
  - action: wait
    selector: "[data-testid='terms-back-btn']"
    timeout: 10000
  - action: screenshot
    name: termeni-ro
  - action: assert
    selector: body
    contains: "Termeni"
