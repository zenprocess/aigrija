name: cookie-consent-reject
description: Verify cookie consent banner can be rejected with essential-only
steps:
  - action: navigate
    url: /#/
  - action: wait
    selector: "[data-testid='consent-banner']"
    timeout: 10000
  - action: screenshot
    name: consent-banner-visible
  - action: click
    selector: "[data-testid='consent-reject-btn']"
  - action: screenshot
    name: consent-rejected
