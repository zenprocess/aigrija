name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_tests:
        description: 'Skip test gates (emergency only)'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !inputs.skip_tests
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit

  test:
    name: Unit tests with coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !inputs.skip_tests
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run unit tests with coverage
        run: npx vitest run --coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-prod
          path: coverage/

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !inputs.skip_tests
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !inputs.skip_tests
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod

  infra-validate:
    name: Infrastructure validation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !inputs.skip_tests
    env:
      HAS_PULUMI: ${{ secrets.PULUMI_CONFIG_PASSPHRASE != '' && 'true' || '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate infra config
        run: bash scripts/validate-infra.sh
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: cd infra && npm ci
      - name: Install policy pack
        run: cd infra/policy && npm install
      - name: Pulumi login (R2 backend)
        if: env.HAS_PULUMI
        run: pulumi login "s3://ai-grija-pulumi-state?region=auto&endpoint=https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
      - name: Pulumi preview with CrossGuard
        if: env.HAS_PULUMI
        uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: dev
          work-dir: infra
          policyPacks: policy
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Warn if Pulumi passphrase missing
        if: ${{ !env.HAS_PULUMI }}
        run: echo "::warning::PULUMI_CONFIG_PASSPHRASE not set — infrastructure validation skipped. Add it to GitHub secrets."

  deploy:
    name: Deploy to Cloudflare Workers
    needs: [typecheck, test, secret-scan, dependency-audit, infra-validate]
    # infra-validate is advisory — TS errors in policy pack should not block deploy
    if: github.ref == 'refs/heads/main' && always() && (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') && (needs.test.result == 'success' || needs.test.result == 'skipped') && (needs.secret-scan.result == 'success' || needs.secret-scan.result == 'skipped') && (needs.dependency-audit.result == 'success' || needs.dependency-audit.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: cd infra && npm ci
      - name: Install policy pack
        run: cd infra/policy && npm install
      - name: Pulumi login (R2 backend)
        run: pulumi login "s3://ai-grija-pulumi-state?region=auto&endpoint=https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT_URL }}
      - name: Apply infrastructure changes
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: dev
          work-dir: infra
          policyPacks: policy
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT_URL }}
      - name: Deploy to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment || 'production' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://ai-grija.ro |" >> $GITHUB_STEP_SUMMARY

  smoke-test:
    name: Infrastructure smoke tests
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run infra smoke tests
        env:
          BASE_URL: https://ai-grija.ro
        run: bash scripts/infra-smoke-test.sh "$BASE_URL"

  health-check:
    name: Production health check
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for production to be ready (progressive backoff, 180s max)
        run: |
          ELAPSED=0
          ATTEMPT=0
          MAX_ELAPSED=180
          echo "Waiting for Cloudflare edge propagation..."
          INITIAL_DELAY=10
          sleep "$INITIAL_DELAY"
          ELAPSED=$INITIAL_DELAY
          while [ "$ELAPSED" -lt "$MAX_ELAPSED" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            STATUS=$(curl -so /dev/null --max-time 10 --connect-timeout 5 -w '%{http_code}' https://ai-grija.ro/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Basic health check passed after ${ELAPSED}s (attempt $ATTEMPT)"
              echo "Running deep health check..."
              DEEP=$(curl -so /dev/null --max-time 30 --connect-timeout 5 -w '%{http_code}' https://ai-grija.ro/health/deep 2>/dev/null || echo "000")
              if [ "$DEEP" = "200" ]; then
                echo "Deep health check passed"
                exit 0
              fi
              echo "Deep health check returned HTTP $DEEP — retrying..."
            else
              echo "Attempt $ATTEMPT: HTTP $STATUS (elapsed: ${ELAPSED}s)"
            fi
            WAIT=$((ATTEMPT * 3))
            [ "$WAIT" -gt 15 ] && WAIT=15
            sleep "$WAIT"
            ELAPSED=$((ELAPSED + WAIT))
          done
          echo "ERROR: Production not healthy after ${ELAPSED}s"
          exit 1

  post-deploy-bdd:
    name: Post-deploy BDD verification
    needs: health-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    container: mcr.microsoft.com/playwright:v1.50.0-noble
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps
      - name: Run BDD stories against production
        id: bdd
        continue-on-error: true
        env:
          BASE_URL: https://ai-grija.ro
          CI: 'true'
        run: npx tsx e2e/bowser-dispatch.ts --base-url $BASE_URL 2>&1 | tee bdd-output.txt
      - name: Create GitHub issues for failures
        if: steps.bdd.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          for result_file in e2e/results/*.json; do
            [ -f "$result_file" ] || continue
            story_name=$(jq -r '.story // empty' "$result_file" 2>/dev/null) || continue
            [ -z "$story_name" ] && continue
            verdict=$(jq -r '[.passes | to_entries[] | select(.value == "fail")] | length' "$result_file" 2>/dev/null) || continue
            if [ "$verdict" -gt "0" ]; then
              failed_passes=$(jq -r '[.passes | to_entries[] | select(.value == "fail") | .key] | join(", ")' "$result_file")
              existing=$(gh issue list --search "QA: $story_name" --label "qa:story" --json number --jq '.[0].number' 2>/dev/null || echo "")
              if [ -z "$existing" ]; then
                ISSUE_BODY=$(printf '## Post-Deploy BDD Failure\n\nStory: %s\nURL: https://ai-grija.ro\nFailed passes: %s\nCommit: %s\n\nAuto-created by post-deploy BDD verification.' "$story_name" "$failed_passes" "$COMMIT_SHA")
                gh issue create \
                  --title "QA: $story_name - $failed_passes failed" \
                  --label "qa:fail,qa:story,auto-detected" \
                  --body "$ISSUE_BODY"
              fi
            fi
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-report
          path: playwright-report/
